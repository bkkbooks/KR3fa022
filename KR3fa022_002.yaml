body:
  text: 宣城吳肅公晴巖原本婺源余煌星川參訂漢史天文志諸星名數有不同於後世者天極即北辰旁三星三公按三公星在北斗杓東又三公一在北斗魁西若天極旁者非三公也蓋后庶帝及太子耳且四星非三星也晋書謂第一星主月二星主日三星主五星亦三星新書謂第四星主諸王乃多一星煌按天極旁者固非三公北斗魁西者亦非三公也星經三公三星在斗柄東三師三星在斗魁西而晋至杓南三星及魁第一星西三星皆曰三公是以魁西之三師為三公宋志云在魁西者名三師正義曰三公三星在北斗杓東又三公三星在北斗魁西因晋志說也後句四星末大星正妃餘三星後宮之屬按星經後句四星為四輸句陳別有六星與此不同煌按句陳六星明大者四其第一星尤大西測第一星二等第二星三等第三第四星皆四等餘皆六等樂叶圖徵云句陳後宮大當正妃是也若孝經援神契云辰極橫后妃四星端大妃光明言四星者舉其明大者也史漢亦作四星不曰橫而曰後句興四輸混不知四輔四星皆
