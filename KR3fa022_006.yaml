body:
  text: 也儀象考成亦六星外增五星俱無十七之數漢書似有誤杓端兩星一內爲矛招搖一外爲盾天鋒按天文內爲元戈外爲招搖煌按星經招搖一星在北斗柄端又名天矛梗河三星在大角東北又名天盾天鋒故天官書云內爲矛外爲盾但共四星非兩星註誤以天鋒爲元戈不知元戈別有一星在招搖北不得云外也若樂叶圖徵以元戈爲招搖以梗河爲天矛晋志亦曰梗河天矛也俱謬禮疏又誤以北斗搖光爲招搖房東北曲十二星曰旗按古圖經天市垣左右環曲各十一星共二十二星無十二星之説煌按星經天市垣在房心北一名天旗共二十二星天官書曲字下當脫二字正義引河鼓左右兩旗爲證然兩旗各九星亦非十二星也太微三光之廷匡衡十二星按左者左執法上相次相次將上將爲左掖太陽東華之門右者右執法上將次將次相上相爲右掖西華中華太陽之門共計得十星耳煌按春秋合誠圖亦曰太微主法式陳星十二以偹非常主武偹言或兼虎賁郎將二星未可知
