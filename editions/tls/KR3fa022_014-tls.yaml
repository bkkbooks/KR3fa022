body:
  text: 太尊一在斗前一在張北煌按斗前之太尊一星即張北之太尊一星只一座無二座考誤土司空一在翼南四星一在婁下一星煌按翼南土司空四星經天該儀象志儀象考成皆無太子一在紫宮一在太微垣煌按太子在紫宮者與帝庶子后宮天樞共一座名北極五星又心前星爲太子從官一在房一在太微垣各二星煌按從官在太微垣者星經協紀辨方書儀象考成皆只一星考誤天田一在角北二星一在牛旁九星主幾內封疆煌按天田在牛旁者經天該儀象志皆無儀象考成只四星天狗一在闕邱南七星一在南斗旁二星皆主防奸賊煌按在南斗旁者星經諸書俱作狗不作天狗又太白所變妖星亦名天狗積水一在井一在胃皆候水災其在井旁者亦主酒用煌按積水各一星在井北者儀象志無經天該儀象考成皆有
