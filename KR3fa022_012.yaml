body:
  text: 説雖稍殊庶或近之儀象考成輔一星附北斗為一座然輔弼招搖非不見之星也或以元戈為北斗第八星招搖為北斗第九星據西測元戈四等招搖三等俱係大星且與斗杓相近其説較勝天象有同名而異位者其占亦異漫記於此以便考識天紀一在天市北九星主萬物理寬訟一在柳南主禽獸齒歲煌按在柳南一星經天該協紀辨方書儀象考成俱作天記三公一在斗樞前一在杓東皆主理陰陽一在太微垣主朝會煌按三公只二座一在斗杓旁一在太微垣各三星若斗樞前者名三師非三公説見前五諸侯一在太微垣主內治天子之侯一曰入觀王朝之象也一在井鬼間明大而直主刺舉不虞藩侯之位一曰主建萬國以養民各五星煌按太微垣五諸侯經天該儀象志皆無儀象考成有之五帝座一在紫宮斧扆之象一在太微垣主五方之神煌按紫宮五帝座星經諸書俱名五帝內座經天該儀象志皆無儀象考成有之御女一四星在句陳旁一一星在軒轅南同占煌按御女在句陳旁者經天該儀象志皆無儀象考成有之在軒轅南者步天歌儀象考成俱附軒轅座內不另名
