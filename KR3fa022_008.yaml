body:
  text: 狼下四星曰弧矢按弧矢共九星四星者誤危為蓋屋按蓋屋自有二小星在旁非危也宋均注危中星高旁兩星墮下似蓋屋謬也煌按天官書載列宿每兼旁星之名如張素為廚胃為天倉營室為清廟曰離宮閣道而外廚天倉離宮閣道皆旁星又心為明堂明堂亦別有星危為蓋屋蓋兼旁星名也星經左角為天田右角為天門房名天旗滅市箕謂之天津參名參伐鬼名天廟皆兼旁星名儀象志蓋屋只一星儀象考成有二星虛為哭泣之事按哭泣二星在危旁虛為哭泣者兼主其事耳煌按哭泣各二星共四星杵臼四星按杵三星臼四星共七星四星誤也正儀云三星亦誤煌按杵臼稍明大者只四星杵一星西測第二星四等臼三星西測第一星三等第二第三星均四等故經天該儀象志皆作四星史漢四星殆亦舉其明大者儀象考成仍作七星又危室下有二大星壁也主圖章文士史漢不載豈以壁壘之壁耶煌按史漢缺壁星當是偶遣之天官書考謂軍西為壘之壘即壁星壘作壁非是壘在軍西乃壘壁陳或天壘城也下文旁一
