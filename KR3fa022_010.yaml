body:
  text: 大星為北落可證北落即北落師門也石氏天棓本類星鋭長四尺者歲星所變妖星非紫宮中天棓甘氏滅槍左右鋭長數丈者亦歲星所變非紫宮天槍也煌按天官書歲星生天棓長四文末鋭漢志作長四尺或有誤索隱謂此甘氏星經文此云石氏亦有誤軒轅為棹星太微為衡星耀四星在軒轅旁主鋒警也正義以為權誤臭又北斗第四星為權考要云南宮之宿火者名權權衡乃宮廷之總名耳煌按爟烽火也亦作權史記封禪書上宿郊見通權火後漢郊祀志同二字音義本通但星經作爟不作權耳星名權衡者多南河亦為權又太白所生月旁妖星名權星北斗第五星名衡又庫樓中四小星名衡又參三星名衡又北河為衡又三台名三衡北斗只七星或云九星為九州象其二星常不見夫天與人應昭昭之多也不見者亦孰得而辨之皆星歷家好奇之説耳煌按春秋元命苞王冰素問注元門寶海經玉樞經徐整長歷皆云北斗有九星七見二隱陶宏景周氏宴通記更有伺北斗二隱星法注云出方諸洞經中其説難信楚辭補注謂七星外輔一星招搖一星北斗經疏謂加輔弼二星宋志北斗第八星曰弼星在第七星右不見第九星曰輔星在第六星左常見考步天歌經天該儀象考成俱無弼星疑即考成北斗旁所增無名之星也二
