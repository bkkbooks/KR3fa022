body:
  text: 之杵一在危一在箕各三星同占而危旁者兼主軍糧煌按杵在危上者儀象志只一星儀象考成有三星韓楚周秦鄭魏晉燕趙齊一為天市旗一散置牛女之間煌按天市垣東蕃第六星宋志作吳越女宿下周秦趙代皆二星共十二國十六星儀象志俱各一星儀象考成有十六星
