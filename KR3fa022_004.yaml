body:
  text: 微小西側六等張衡所謂抱極細星為輔臣之象無大星亦非後宮屬也環之匡衛十二星按西蕃右樞少尉上輔少輔上衛少衛上丞共七星東蕃左樞上宰少宰上弼少弼上衛少衛少丞共八星與右樞為十五星云煌按紫宮匡衛漢書亦十二星盧舜治云班氏遣三星漢書多本史記竊謂史記二字乃五字之訛耳斗口三星若見若否曰陰德或曰天一按考要陰德天一原二星名天一與太一各二星並列紫宮外陰德二星居紫宮內不得混也煌按陰德二星隋志分為陰德陽德不聞有天一之各天一太一各一星非二星一或作乙考要本云各一星天棓五星漢書作四星當從史記是煌按天棓利瑪寶經天該作六星謂雜氣星也步天歌儀象考成俱五星西測皆二三四等大星漢書少一星當誤史記并天文閣道只六星漢書作十七星疑誤煌按漢書閣道十七星梅勿巷云不知何據以歷書圖閣道十餘星為本諸此今考經天該作八星三暗二巨三細蓋兼旁星
